  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

e: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"c74c5f85-7974-4efb-a435-a0f3d9f61de9\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"2dac6fc5-d3a9-40bd-b1d6-2706222ac297\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"f6d538e8-899b-4fe7-a5a1-d0bcc798851f\") format('woff2');\n  unicode-range: U+1F00-1FFF;\n}\n/* greek */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"bd00d9c9-610a-4b91-8a0f-d8569fd2e8f3\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"28822cff-6734-48b9-ad0b-4a4d390eb166\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"951a0019-ac40-45f7-ba0d-e2569021029b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"32c87159-64fc-422d-8e1e-220c3c109194\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n  <style>/* ============================================================\n   NEON — Branding & Performance\n   Design system\n   ============================================================ */\n\n:root {\n  /* Core palette */\n  --bg:        #0A0A0A;\n  --bg-2:      #0d0e0d;\n  --ink:       #FFFFFF;\n  --neon:      #36F547;\n  --neon-deep: #1faf32;\n  --muted:     rgba(255, 255, 255, 0.56);\n  --faint:     rgba(255, 255, 255, 0.30);\n  --hair:      rgba(255, 255, 255, 0.08);\n  --hair-2:    rgba(255, 255, 255, 0.14);\n  --neon-glow: rgba(54, 245, 71, 0.55);\n  --neon-soft: rgba(54, 245, 71, 0.14);\n\n  /* Type */\n  --display: \"Switzer\", \"Inter\", system-ui, sans-serif;\n  --body:    \"Inter\", system-ui, sans-serif;\n\n  /* Rhythm */\n  --maxw: 1240px;\n  --pad: clamp(20px, 5vw, 80px);\n  --r: 18px;\n}\n\n* { margin: 0; padding: 0; box-sizing: border-box; }\n\nhtml { scroll-behavior: smooth; }\n\nbody {\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--body);\n  font-size: 17px;\n  line-height: 1.6;\n  -webkit-font-smoothing: antialiased;\n  overflow-x: hidden;\n  cursor: none;\n}\n\n/* subtle film grain + vignette baked into the page */\nbody::before {\n  content: \"\";\n  position: fixed;\n  inset: 0;\n  pointer-events: none;\n  z-index: 1;\n  background:\n    radial-gradient(120% 80% at 50% -10%, rgba(54,245,71,0.07), transparent 60%),\n    radial-gradient(100% 100% at 50% 120%, rgba(0,0,0,0.6), transparent 55%);\n}\n\nimg { display: block; max-width: 100%; }\na { color: inherit; text-decoration: none; }\nul { list-style: none; }\n\n.wrap {\n  width: 100%;\n  max-width: var(--maxw);\n  margin: 0 auto;\n  padding-inline: var(--pad);\n}\n\n/* ---------- Type scale ---------- */\n.eyebrow {\n  font-family: var(--body);\n  font-weight: 500;\n  font-size: 13px;\n  letter-spacing: 0.28em;\n  text-transform: uppercase;\n  color: var(--neon);\n  display: inline-flex;\n  align-items: center;\n  gap: 12px;\n}\n.eyebrow::before {\n  content: \"\";\n  width: 26px;\n  height: 1px;\n  background: linear-gradient(90deg, transparent, var(--neon));\n}\n\nh1, h2, h3 {\n  font-family: var(--display);\n  font-weight: 600;\n  line-height: 1.02;\n  letter-spacing: -0.025em;\n  text-wrap: balance;\n}\n\n.section-title {\n  font-size: clamp(34px, 5vw, 62px);\n}\n.lead {\n  color: var(--muted);\n  font-size: clamp(16px, 1.5vw, 19px);\n  max-width: 56ch;\n  text-wrap: pretty;\n}\n\n.neon-text {\n  color: var(--neon);\n  text-shadow: 0 0 24px var(--neon-glow), 0 0 60px rgba(54,245,71,0.25);\n}\n\n/* ============================================================\n   Custom cursor + spotlight\n   ============================================================ */\n.cursor-ring, .cursor-dot {\n  position: fixed;\n  top: 0; left: 0;\n  pointer-events: none;\n  z-index: 9999;\n  border-radius: 50%;\n  transform: translate(-50%, -50%);\n  mix-blend-mode: difference;\n}\n.cursor-ring {\n  width: 38px; height: 38px;\n  border: 1.5px solid var(--neon);\n  transition: width .25s ease, height .25s ease, background .25s ease, border-color .25s ease;\n}\n.cursor-dot {\n  width: 5px; height: 5px;\n  background: var(--neon);\n}\n.cursor-ring.is-hot {\n  width: 64px; height: 64px;\n  background: rgba(54,245,71,0.16);\n  border-color: transparent;\n  mix-blend-mode: normal;\n}\n.spotlight {\n  position: fixed;\n  inset: 0;\n  z-index: 0;\n  pointer-events: none;\n  background: radial-gradient(380px circle at var(--mx, 50%) var(--my, 30%), rgba(54,245,71,0.10), transparent 70%);\n  transition: opacity .4s ease;\n}\n@media (hover: none) {\n  body { cursor: auto; }\n  .cursor-ring, .cursor-dot, .spotlight { display: none; }\n}\n\n/* ============================================================\n   Preloader\n   ============================================================ */\n#preloader {\n  position: fixed;\n  inset: 0;\n  z-index: 10000;\n  background: var(--bg);\n  display: grid;\n  place-content: center;\n  justify-items: center;\n  gap: 34px;\n  transition: opacity .8s ease, visibility .8s ease;\n}\n#preloader.done { opacity: 0; visibility: hidden; }\n.pre-mark {\n  width: 96px;\n  filter: drop-shadow(0 0 22px var(--neon-glow));\n  animation: pre-pulse 1.4s ease-in-out infinite;\n}\n@keyframes pre-pulse {\n  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 14px rgba(54,245,71,0.4)); }\n  50%      { transform: scale(1.08); filter: drop-shadow(0 0 34px var(--neon-glow)); }\n}\n.pre-bar {\n  width: 200px;\n  height: 2px;\n  background: var(--hair);\n  border-radius: 2px;\n  overflow: hidden;\n}\n.pre-bar i {\n  display: block;\n  height: 100%;\n  width: 0%;\n  background: var(--neon);\n  box-shadow: 0 0 12px var(--neon-glow);\n}\n.pre-label {\n  font-size: 11px;\n  letter-spacing: 0.4em;\n  text-transform: uppercase;\n  color: var(--faint);\n}\n\n/* ============================================================\n   Scroll progress bar\n   ============================================================ */\n#progress {\n  position: fixed;\n  top: 0; left: 0;\n  height: 2px;\n  width: 0%;\n  background: linear-gradient(90deg, var(--neon-deep), var(--neon));\n  box-shadow: 0 0 10px var(--neon-glow);\n  z-index: 1000;\n}\n\n/* ============================================================\n   Header\n   ============================================================ */\n#header {\n  position: fixed;\n  top: 0; left: 0; right: 0;\n  z-index: 900;\n  transition: background .4s ease, backdrop-filter .4s ease, border-color .4s ease, padding .4s ease;\n  border-bottom: 1px solid transparent;\n  padding-block: 22px;\n}\n#header.shrink {\n  background: rgba(10,10,10,0.6);\n  backdrop-filter: blur(18px) saturate(140%);\n  -webkit-backdrop-filter: blur(18px) saturate(140%);\n  border-bottom-color: var(--hair);\n  padding-block: 12px;\n}\n.nav {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 24px;\n}\n.brand {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n}\n.brand img {\n  width: 34px;\n  filter: drop-shadow(0 0 10px var(--neon-soft));\n  transition: transform .4s cubic-bezier(.2,.8,.2,1);\n}\n.brand:hover img { transform: rotate(-8deg) scale(1.06); }\n.brand b {\n  font-family: var(--display);\n  font-weight: 600;\n  font-size: 21px;\n  letter-spacing: 0.06em;\n}\n.nav-links {\n  display: flex;\n  align-items: center;\n  gap: 34px;\n}\n.nav-links a {\n  font-size: 14.5px;\n  color: var(--muted);\n  position: relative;\n  transition: color .25s ease;\n}\n.nav-links a::after {\n  content: \"\";\n  position: absolute;\n  left: 0; bottom: -6px;\n  width: 0; height: 1px;\n  background: var(--neon);\n  box-shadow: 0 0 8px var(--neon-glow);\n  transition: width .3s ease;\n}\n.nav-links a:hover { color: var(--ink); }\n.nav-links a:hover::after { width: 100%; }\n\n/* ============================================================\n   Buttons\n   ============================================================ */\n.btn {\n  --bw: 1px;\n  position: relative;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 10px;\n  font-family: var(--body);\n  font-weight: 500;\n  font-size: 15px;\n  letter-spacing: 0.01em;\n  padding: 15px 26px;\n  border-radius: 100px;\n  border: var(--bw) solid var(--hair-2);\n  color: var(--ink);\n  background: rgba(255,255,255,0.02);\n  overflow: hidden;\n  isolation: isolate;\n  transition: border-color .3s ease, color .3s ease, transform .2s ease;\n  will-change: transform;\n}\n.btn .sweep {\n  position: absolute;\n  inset: 0;\n  z-index: -1;\n  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);\n  transform: translateX(-130%);\n  transition: transform .7s cubic-bezier(.2,.7,.2,1);\n}\n.btn:hover .sweep { transform: translateX(130%); }\n\n.btn--primary {\n  background: var(--neon);\n  color: #04210a;\n  border-color: transparent;\n  font-weight: 600;\n  box-shadow: 0 0 0 0 var(--neon-glow), 0 10px 40px -8px rgba(54,245,71,0.5);\n}\n.btn--primary:hover {\n  box-shadow: 0 0 28px -2px var(--neon-glow), 0 14px 50px -8px rgba(54,245,71,0.6);\n}\n.btn--primary .sweep {\n  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.5) 50%, transparent 70%);\n}\n.btn--ghost:hover { border-color: var(--neon); color: var(--neon); }\n.btn--sm { padding: 11px 20px; font-size: 14px; }\n\n.btn-arrow { transition: transform .3s ease; }\n.btn:hover .btn-arrow { transform: translateX(4px); }\n\n/* ============================================================\n   Sections shell\n   ============================================================ */\nsection { position: relative; z-index: 2; }\n.section-pad { padding-block: clamp(80px, 11vw, 160px); }\n.section-head {\n  display: flex;\n  flex-direction: column;\n  gap: 22px;\n  margin-bottom: clamp(48px, 6vw, 80px);\n  max-width: 760px;\n}\n\n/* ============================================================\n   Hero\n   ============================================================ */\n#hero {\n  min-height: 100svh;\n  display: flex;\n  align-items: center;\n  padding-top: 120px;\n  padding-bottom: 80px;\n}\n.hero-aura {\n  position: absolute;\n  z-index: -1;\n  top: 38%; left: 50%;\n  width: min(900px, 90vw);\n  aspect-ratio: 1;\n  transform: translate(-50%, -50%);\n  background: radial-gradient(circle, rgba(54,245,71,0.16), transparent 62%);\n  filter: blur(20px);\n  animation: breathe 6s ease-in-out infinite;\n}\n@keyframes breathe {\n  0%, 100% { opacity: .65; transform: translate(-50%,-50%) scale(0.92); }\n  50%      { opacity: 1;   transform: translate(-50%,-50%) scale(1.08); }\n}\n.hero-grid {\n  display: grid;\n  grid-template-columns: 1.15fr 0.85fr;\n  gap: 60px;\n  align-items: center;\n  width: 100%;\n}\n.hero-eyebrow { margin-bottom: 30px; }\n#hero h1 {\n  font-size: clamp(44px, 7.2vw, 104px);\n  letter-spacing: -0.03em;\n}\n.line-mask { overflow: hidden; display: block; }\n.line-mask > span {\n  display: block;\n  transform: translateY(110%);\n}\n.hero-sub {\n  margin-top: 30px;\n  margin-bottom: 40px;\n  font-size: clamp(16px, 1.6vw, 20px);\n  color: var(--muted);\n  max-width: 50ch;\n}\n.hero-cta { display: flex; gap: 16px; flex-wrap: wrap; }\n\n.hero-proof {\n  margin-top: 56px;\n  display: flex;\n  gap: 40px;\n  flex-wrap: wrap;\n  padding-top: 30px;\n  border-top: 1px solid var(--hair);\n}\n.proof b {\n  font-family: var(--display);\n  font-weight: 600;\n  font-size: clamp(24px, 3vw, 34px);\n  display: block;\n  line-height: 1;\n}\n.proof span { font-size: 13px; color: var(--faint); letter-spacing: 0.02em; }\n\n.hero-visual {\n  position: relative;\n  display: grid;\n  place-items: center;\n  aspect-ratio: 1;\n}\n.hero-visual .ring {\n  position: absolute;\n  border: 1px solid var(--hair);\n  border-radius: 50%;\n}\n.hero-visual .ring.r1 { inset: 0; }\n.hero-visual .ring.r2 { inset: 14%; border-color: var(--hair-2); }\n.hero-visual .ring.r3 { inset: 30%; border-style: dashed; border-color: rgba(54,245,71,0.25); animation: spin 28s linear infinite; }\n@keyframes spin { to { transform: rotate(360deg); } }\n.hero-symbol {\n  width: 56%;\n  filter: drop-shadow(0 0 40px var(--neon-glow));\n  animation: float 5s ease-in-out infinite;\n  position: relative;\n  z-index: 2;\n}\n@keyframes float { 0%,100%{ transform: translateY(-8px);} 50%{ transform: translateY(8px);} }\n\n/* ============================================================\n   Marquee\n   ============================================================ */\n.marquee {\n  position: relative;\n  z-index: 2;\n  border-top: 1px solid var(--hair);\n  border-bottom: 1px solid var(--hair);\n  padding-block: 26px;\n  overflow: hidden;\n  background: var(--bg-2);\n  -webkit-mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);\n  mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);\n}\n.marquee-track {\n  display: flex;\n  width: max-content;\n  gap: 0;\n  animation: marquee 26s linear infinite;\n}\n.marquee-track span {\n  font-family: var(--display);\n  font-weight: 600;\n  font-size: clamp(22px, 3vw, 38px);\n  letter-spacing: -0.01em;\n  color: var(--faint);\n  display: inline-flex;\n  align-items: center;\n  padding-inline: 34px;\n}\n.marquee-track span .dot {\n  color: var(--neon);\n  margin-left: 68px;\n  font-size: 0.6em;\n  text-shadow: 0 0 14px var(--neon-glow);\n}\n@keyframes marquee { to { transform: translateX(-50%); } }\n\n/* ============================================================\n   Stats\n   ============================================================ */\n.stats-grid {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 1px;\n  background: var(--hair);\n  border: 1px solid var(--hair);\n  border-radius: var(--r);\n  overflow: hidden;\n}\n.stat {\n  background: var(--bg);\n  padding: 42px 32px;\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n  transition: background .4s ease;\n}\n.stat:hover { background: var(--bg-2); }\n.stat .num {\n  font-family: var(--display);\n  font-weight: 600;\n  font-size: clamp(40px, 5vw, 64px);\n  line-height: 1;\n  letter-spacing: -0.03em;\n}\n.stat .num .suf { color: var(--neon); text-shadow: 0 0 20px var(--neon-glow); }\n.stat .cap { color: var(--muted); font-size: 14.5px; }\n\n/* ============================================================\n   Cards grid (services)\n   ============================================================ */\n.cards {\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  gap: 22px;\n}\n.card {\n  position: relative;\n  padding: 38px;\n  border-radius: var(--r);\n  background:\n    radial-gradient(420px circle at var(--cx, 50%) var(--cy, 0%), rgba(54,245,71,0.10), transparent 60%),\n    linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));\n  border: 1px solid var(--hair);\n  overflow: hidden;\n  transform-style: preserve-3d;\n  transition: border-color .35s ease, box-shadow .35s ease;\n  will-change: transform;\n}\n.card::after {\n  /* top reflection */\n  content: \"\";\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  height: 1px;\n  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);\n}\n.card:hover {\n  border-color: rgba(54,245,71,0.4);\n  box-shadow: 0 30px 80px -30px rgba(54,245,71,0.3);\n}\n.card-num {\n  font-family: var(--display);\n  font-size: 13px;\n  letter-spacing: 0.2em;\n  color: var(--faint);\n  margin-bottom: 28px;\n}\n.card-icon {\n  width: 46px; height: 46px;\n  margin-bottom: 24px;\n  display: grid;\n  place-items: center;\n  border-radius: 12px;\n  border: 1px solid var(--hair-2);\n  color: var(--neon);\n  background: var(--neon-soft);\n}\n.card-icon svg { width: 22px; height: 22px; }\n.card h3 { font-size: 24px; margin-bottom: 12px; letter-spacing: -0.01em; }\n.card p { color: var(--muted); font-size: 15.5px; }\n\n/* ============================================================\n   Method (timeline)\n   ============================================================ */\n.steps {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 0;\n  position: relative;\n}\n.steps::before {\n  content: \"\";\n  position: absolute;\n  top: 23px; left: 0; right: 0;\n  height: 1px;\n  background: var(--hair);\n}\n.step {\n  padding-right: 30px;\n  position: relative;\n}\n.step .node {\n  width: 46px; height: 46px;\n  border-radius: 50%;\n  background: var(--bg);\n  border: 1px solid var(--hair-2);\n  display: grid;\n  place-items: center;\n  font-family: var(--display);\n  font-weight: 600;\n  color: var(--neon);\n  position: relative;\n  z-index: 2;\n  margin-bottom: 26px;\n  transition: border-color .3s ease, box-shadow .3s ease;\n}\n.step:hover .node {\n  border-color: var(--neon);\n  box-shadow: 0 0 20px var(--neon-glow);\n}\n.step h3 { font-size: 20px; margin-bottom: 10px; }\n.step p { color: var(--muted); font-size: 15px; padding-right: 14px; }\n\n/* ============================================================\n   Why NEON\n   ============================================================ */\n.why-grid {\n  display: grid;\n  grid-template-columns: 1fr 0.85fr;\n  gap: 64px;\n  align-items: center;\n}\n.why-list { display: flex; flex-direction: column; }\n.why-item {\n  display: flex;\n  gap: 22px;\n  padding: 26px 0;\n  border-top: 1px solid var(--hair);\n}\n.why-item:last-child { border-bottom: 1px solid var(--hair); }\n.why-item .mk {\n  flex: none;\n  width: 30px; height: 30px;\n  border-radius: 8px;\n  display: grid; place-items: center;\n  color: var(--neon);\n  border: 1px solid rgba(54,245,71,0.3);\n  background: var(--neon-soft);\n  margin-top: 2px;\n}\n.why-item .mk svg { width: 15px; height: 15px; }\n.why-item h3 { font-size: 19px; margin-bottom: 6px; }\n.why-item p { color: var(--muted); font-size: 15px; }\n\n.why-visual {\n  position: relative;\n  aspect-ratio: 4/5;\n  border-radius: var(--r);\n  border: 1px solid var(--hair);\n  display: grid;\n  place-items: center;\n  overflow: hidden;\n  background: radial-gradient(circle at 50% 40%, rgba(54,245,71,0.12), transparent 60%), var(--bg-2);\n}\n.why-visual img {\n  width: 62%;\n  filter: drop-shadow(0 0 50px var(--neon-glow));\n  position: relative;\n  z-index: 2;\n}\n.scanline {\n  position: absolute;\n  left: 0; right: 0;\n  height: 140px;\n  background: linear-gradient(180deg, transparent, rgba(54,245,71,0.16), transparent);\n  z-index: 3;\n  animation: scan 4s ease-in-out infinite;\n  pointer-events: none;\n}\n@keyframes scan {\n  0%, 100% { transform: translateY(-160px); opacity: 0; }\n  50%      { opacity: 1; }\n  85%      { transform: translateY(560px); opacity: 0; }\n}\n.why-visual .grid-bg {\n  position: absolute;\n  inset: 0;\n  background-image:\n    linear-gradient(var(--hair) 1px, transparent 1px),\n    linear-gradient(90deg, var(--hair) 1px, transparent 1px);\n  background-size: 38px 38px;\n  -webkit-mask-image: radial-gradient(circle at 50% 45%, #000, transparent 70%);\n  mask-image: radial-gradient(circle at 50% 45%, #000, transparent 70%);\n}\n\n/* ============================================================\n   CTA final\n   ============================================================ */\n#cta { text-align: center; }\n.cta-card {\n  position: relative;\n  border-radius: 28px;\n  border: 1px solid rgba(54,245,71,0.25);\n  background:\n    radial-gradient(600px circle at 50% 0%, rgba(54,245,71,0.16), transparent 60%),\n    linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));\n  padding: clamp(56px, 8vw, 100px) var(--pad);\n  overflow: hidden;\n}\n.cta-card .glow-floor {\n  position: absolute;\n  left: 50%; bottom: -50%;\n  width: 80%; aspect-ratio: 1;\n  transform: translateX(-50%);\n  background: radial-gradient(circle, rgba(54,245,71,0.2), transparent 60%);\n  filter: blur(30px);\n}\n.cta-mark { width: 70px; margin: 0 auto 30px; filter: drop-shadow(0 0 24px var(--neon-glow)); position: relative; z-index: 2; }\n.cta-card h2 { font-size: clamp(32px, 5vw, 60px); position: relative; z-index: 2; }\n.cta-card p { color: var(--muted); margin: 20px auto 38px; max-width: 50ch; position: relative; z-index: 2; }\n.cta-card .hero-cta { justify-content: center; position: relative; z-index: 2; }\n\n/* ============================================================\n   Footer\n   ============================================================ */\nfooter {\n  position: relative;\n  z-index: 2;\n  border-top: 1px solid var(--hair);\n  padding-block: 70px 40px;\n}\n.foot-grid {\n  display: grid;\n  grid-template-columns: 1.6fr 1fr 1fr 1.2fr;\n  gap: 40px;\n  margin-bottom: 56px;\n}\n.foot-brand img { width: 48px; filter: drop-shadow(0 0 18px var(--neon-glow)); margin-bottom: 18px; }\n.foot-brand p { color: var(--muted); font-size: 15px; max-width: 30ch; }\n.foot-col h4 {\n  font-family: var(--body);\n  font-size: 12px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--faint);\n  margin-bottom: 18px;\n}\n.foot-col a, .foot-col span {\n  display: block;\n  color: var(--muted);\n  font-size: 15px;\n  margin-bottom: 12px;\n  transition: color .25s ease;\n  width: fit-content;\n}\n.foot-col a:hover { color: var(--neon); }\n.socials { display: flex; gap: 12px; }\n.socials a {\n  width: 40px; height: 40px;\n  border-radius: 10px;\n  border: 1px solid var(--hair);\n  display: grid; place-items: center;\n  color: var(--muted);\n  transition: all .25s ease;\n}\n.socials a:hover { color: var(--neon); border-color: var(--neon); box-shadow: 0 0 16px var(--neon-soft); }\n.socials a svg { width: 18px; height: 18px; }\n.foot-bottom {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  flex-wrap: wrap;\n  gap: 16px;\n  padding-top: 28px;\n  border-top: 1px solid var(--hair);\n  color: var(--faint);\n  font-size: 13px;\n}\n\n/* ============================================================\n   Reveal animation\n   ============================================================ */\n.reveal {\n  opacity: 0;\n  transform: translateY(28px);\n  transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1);\n}\n.reveal.in { opacity: 1; transform: none; }\n\n/* Frozen-transition / reduced-motion fallback: guarantee everything is visible */\n.no-anim .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }\n.no-anim .line-mask > span { transform: none !important; }\n.no-anim #hero [data-hero-fade] { opacity: 1 !important; transform: none !important; }\n.no-anim #preloader { display: none !important; }\n.no-anim .hero-aura, .no-anim .scanline { animation: none !important; }\n.no-anim .cursor-ring, .no-anim .cursor-dot { display: none !important; }\n.no-anim body { cursor: auto; }\n\n/* ============================================================\n   Diagnóstico — form page\n   ============================================================ */\n.diag-page { min-height: 100svh; display: flex; align-items: center; padding-top: 110px; padding-bottom: 70px; }\n.diag-aura {\n  position: absolute; z-index: -1; top: 40%; left: 30%;\n  width: min(720px, 80vw); aspect-ratio: 1; transform: translate(-50%, -50%);\n  background: radial-gradient(circle, rgba(54,245,71,0.13), transparent 62%);\n  filter: blur(24px); animation: breathe 6s ease-in-out infinite;\n}\n.diag-grid {\n  display: grid; grid-template-columns: 0.92fr 1.08fr; gap: 64px; align-items: center; width: 100%;\n}\n.diag-aside .back {\n  display: flex; width: fit-content; align-items: center; gap: 8px;\n  font-size: 14px; color: var(--muted); margin-bottom: 26px; transition: color .25s ease, gap .25s ease;\n}\n.diag-aside .back:hover { color: var(--neon); gap: 12px; }\n.diag-aside h1 { font-size: clamp(36px, 4.6vw, 60px); margin: 20px 0 22px; }\n.diag-aside .lead { font-size: clamp(16px, 1.5vw, 19px); }\n.diag-trust { margin-top: 40px; display: flex; flex-direction: column; gap: 18px; }\n.diag-trust .ti { display: flex; gap: 14px; align-items: flex-start; color: var(--muted); font-size: 15px; }\n.diag-trust .ti .mk {\n  flex: none; width: 26px; height: 26px; border-radius: 7px; display: grid; place-items: center;\n  color: var(--neon); border: 1px solid rgba(54,245,71,0.3); background: var(--neon-soft); margin-top: 1px;\n}\n.diag-trust .ti .mk svg { width: 13px; height: 13px; }\n.diag-symbol-row { display: flex; align-items: center; gap: 16px; margin-top: 44px; padding-top: 28px; border-top: 1px solid var(--hair); }\n.diag-symbol-row img { width: 40px; filter: drop-shadow(0 0 14px var(--neon-soft)); }\n.diag-symbol-row span { font-size: 13px; color: var(--faint); letter-spacing: 0.02em; }\n\n.form-card {\n  position: relative; border-radius: 24px; overflow: hidden;\n  border: 1px solid var(--hair);\n  background:\n    radial-gradient(560px circle at 80% -10%, rgba(54,245,71,0.10), transparent 55%),\n    linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.008));\n  padding: clamp(30px, 4vw, 46px);\n}\n.form-card::after {\n  content: \"\"; position: absolute; top: 0; left: 0; right: 0; height: 1px;\n  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);\n}\n.form-card .fc-head { margin-bottom: 30px; }\n.form-card .fc-head h2 { font-size: clamp(22px, 2.4vw, 28px); margin-bottom: 8px; }\n.form-card .fc-head p { color: var(--muted); font-size: 15px; }\n\n.field { margin-bottom: 22px; }\n.field > label {\n  display: block; font-size: 13px; letter-spacing: 0.04em; color: var(--muted);\n  margin-bottom: 9px; font-weight: 500;\n}\n.field > label .req { color: var(--neon); }\n.input-shell {\n  position: relative; display: flex; align-items: center;\n  border: 1px solid var(--hair-2); border-radius: 12px;\n  background: rgba(255,255,255,0.02);\n  transition: border-color .25s ease, box-shadow .25s ease, background .25s ease;\n}\n.input-shell:focus-within {\n  border-color: var(--neon);\n  box-shadow: 0 0 0 3px rgba(54,245,71,0.12), 0 0 22px -6px var(--neon-glow);\n  background: rgba(54,245,71,0.03);\n}\n.input-shell .prefix {\n  padding-left: 16px; color: var(--faint); font-size: 15px; display: grid; place-items: center;\n}\n.input-shell .prefix svg { width: 17px; height: 17px; }\n.field input {\n  width: 100%; background: transparent; border: 0; outline: 0;\n  color: var(--ink); font-family: var(--body); font-size: 15.5px;\n  padding: 15px 16px; letter-spacing: 0.01em;\n}\n.field input::placeholder { color: rgba(255,255,255,0.26); }\n.input-shell .prefix + input { padding-left: 10px; }\n.field.has-error .input-shell { border-color: #ff5a5a; box-shadow: 0 0 0 3px rgba(255,90,90,0.12); }\n.field .err { display: none; color: #ff7a7a; font-size: 12.5px; margin-top: 7px; }\n.field.has-error .err { display: block; }\n\n.form-card .btn { width: 100%; margin-top: 8px; }\n.form-note { text-align: center; color: var(--faint); font-size: 12.5px; margin-top: 18px; }\n\n/* success state */\n.form-success { display: none; text-align: center; padding: 14px 0; }\n.form-card.is-done .form-body { display: none; }\n.form-card.is-done .form-success { display: block; }\n.form-success .succ-mark {\n  width: 64px; margin: 0 auto 24px; filter: drop-shadow(0 0 22px var(--neon-glow));\n  animation: pre-pulse 2.4s ease-in-out infinite;\n}\n.form-success h2 { font-size: clamp(24px, 3vw, 32px); margin-bottom: 14px; }\n.form-success p { color: var(--muted); max-width: 38ch; margin: 0 auto 28px; }\n.form-success .summary {\n  text-align: left; border: 1px solid var(--hair); border-radius: 14px;\n  padding: 18px 20px; margin: 0 auto 26px; max-width: 360px; display: grid; gap: 10px;\n}\n.form-success .summary .row { display: flex; justify-content: space-between; gap: 16px; font-size: 14px; }\n.form-success .summary .row span { color: var(--faint); }\n.form-success .summary .row b { font-weight: 500; color: var(--ink); text-align: right; word-break: break-word; }\n.form-success .succ-prompt { color: var(--muted); font-size: 14.5px; margin: 0 0 16px; }\n.form-success .wa-ico { width: 18px; height: 18px; }\n\n@media (max-width: 940px) {\n  .diag-grid { grid-template-columns: 1fr; gap: 40px; }\n  .diag-aside { max-width: 620px; }\n  .diag-symbol-row { margin-top: 28px; }\n}\n\n/* ============================================================\n   Responsive\n   ============================================================ */\n@media (max-width: 980px) {\n  .hero-grid { grid-template-columns: 1fr; gap: 40px; }\n  .hero-visual { max-width: 420px; margin-inline: auto; order: -1; }\n  .cards { grid-template-columns: 1fr; }\n  .stats-grid { grid-template-columns: repeat(2, 1fr); }\n  .steps { grid-template-co
